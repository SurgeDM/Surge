# .golangci.yml
version: "2"

run:
  tests: true

linters:
  disable-all: true
  enable:
    - staticcheck
    - govet
    - errcheck
    - unused
    - ineffassign
    - unparam
    
    - prealloc
    - makezero
    
    - bodyclose
    - noctx
    - sqlclosecheck
    - rowserrcheck
    
    - errorlint
    - nilerr
    - copyloopvar
    - gocritic

linters-settings:
  govet:
    enable:
      - shadow
  unparam:
    check-exported: true
