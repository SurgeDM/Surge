name: Close Stale PRs

on:
  schedule:
    - cron: '0 0 * * *' # Runs once a day at midnight
  workflow_dispatch:

permissions:
  pull-requests: write # Required to label and close PRs
  issues: write        # Required by the action, even if we skip issues

jobs:
  close-stale-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Close Stale PRs
        uses: actions/stale@v10.2.0
        with:
          # --- PR Configuration ---
          days-before-pr-stale: 5
          days-before-pr-close: 2
          stale-pr-message: 'This PR has had no activity for 5 days. It will be closed in 2 days if no further updates are made.'
          stale-pr-label: 'stale'
          
          # --- Issue Configuration (Disabled) ---
          days-before-issue-stale: -1
          days-before-issue-close: -1

          exempt-pr-labels: 'pinned,do-not-close'
