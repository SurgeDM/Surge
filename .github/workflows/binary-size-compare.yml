name: Binary Size Compare

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    name: Compare Binary Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
          check-latest: false

      - name: Build and Compare
        id: compare
        shell: bash
        run: |
          set -euo pipefail

          # Build PR version (using stripped flags to get true production size)
          go build -ldflags="-s -w" -o /tmp/binary-pr .
          size_pr=$(stat -c%s /tmp/binary-pr)

          # Fetch and build Main version
          git fetch origin main:refs/remotes/origin/main
          git checkout --detach origin/main
          
          go build -ldflags="-s -w" -o /tmp/binary-main .
          size_main=$(stat -c%s /tmp/binary-main)

          diff=$((size_pr - size_main))
          
          echo "size_pr=$size_pr" >> "$GITHUB_OUTPUT"
          echo "size_main=$size_main" >> "$GITHUB_OUTPUT"
          echo "diff=$diff" >> "$GITHUB_OUTPUT"
          
          if [ "$size_pr" -gt "$size_main" ]; then
            echo "exceeds=true" >> "$GITHUB_OUTPUT"
          else
            echo "exceeds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR (Create or Update)
        uses: actions/github-script@v7
        with:
          script: |
            const pr = Number('${{ steps.compare.outputs.size_pr }}');
            const main = Number('${{ steps.compare.outputs.size_main }}');
            const diff = Number('${{ steps.compare.outputs.diff }}');
            const exceeds = '${{ steps.compare.outputs.exceeds }}' === 'true';

            // Better formatter handling negative numbers correctly
            const fmt = (n) => {
              const units = ['B','KB','MB','GB'];
              let i = 0; let v = Math.abs(n);
              while (v >= 1024 && i < 3) { v /= 1024; i++; }
              return `${(n < 0 ? '-' : '')}${v.toFixed(2)} ${units[i]}`;
            };

            const statusLabel = exceeds ? "⚠️ **Size Increased**" : "✅ **Size Decreased or Stable**";
            
            // Hidden signature so the bot knows which comment is its own
            const signature = "";
            
            const body = `${signature}
            ### Binary Size Analysis
            ${statusLabel}
            
            | Version | Human Readable | Raw Bytes |
            | :--- | :--- | :--- |
            | **Main** | ${fmt(main)} | \`${main}\` |
            | **PR** | ${fmt(pr)} | \`${pr}\` |
            | **Difference** | **${fmt(diff)}** | \`${diff}\` |
            `;

            // Look for existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            
            const existingComment = comments.data.find(c => c.body.includes(signature));

            if (existingComment) {
              // Update the existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else if (exceeds) {
              // Only create a NEW comment if the size increased
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
