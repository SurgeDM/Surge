# Gruvbox - Retro groove color scheme for Vim
# source: https://github.com/morhetz/gruvbox

[colors]
name = "Gruvbox"

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"
accent = "#8ec07c"

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

