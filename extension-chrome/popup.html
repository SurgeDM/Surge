<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=360" />
    <title>Surge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <header class="header">
        <div class="logo">
          <img src="icons/icon48.png" alt="Surge" />
          <h1>SURGE</h1>
        </div>
        <div class="header-right">
          <div class="status-badge" id="serverStatus">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">Connecting...</span>
          </div>
          <button class="settings-btn" id="settingsBtn" type="button" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Downloads Section -->
      <section class="downloads-section" id="downloadsSection">
        <div class="downloads-header">
          <div class="downloads-title-row">
            <span class="section-title">Downloads</span>
            <span class="download-count" id="downloadCount">0</span>
          </div>
          <div class="view-switch" id="viewSwitch">
            <button class="view-tab active" id="viewTabActive" type="button">Active</button>
            <button class="view-tab" id="viewTabHistory" type="button">History</button>
          </div>
        </div>

        <div class="downloads-list" id="downloadsList">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📦</div>
            <p>No active downloads</p>
            <p class="empty-hint">Downloads will appear here automatically</p>
          </div>
        </div>
      </section>

      <!-- Settings Section (hidden by default) -->
      <section class="settings-section hidden" id="settingsSection">
        <div class="settings-group">
          <span class="settings-group-title">Connection</span>
          <div class="auth-row">
            <div class="auth-label">
              <label for="serverUrl">Server URL</label>
            </div>
            <div class="auth-input">
              <input
                type="text"
                id="serverUrl"
                placeholder="http://127.0.0.1:1700"
              />
              <button id="saveServerUrl">Save</button>
            </div>
            <div class="auth-status" id="serverUrlStatus"></div>
          </div>
          <div class="auth-row">
            <div class="auth-label">
              <label for="authToken">Auth Token</label>
              <span
                class="auth-help"
                data-tooltip="Get the token by running: surge token"
                >?</span
              >
            </div>
            <div class="auth-input">
              <input
                type="password"
                id="authToken"
                placeholder="Paste token from Surge"
              />
              <button id="saveToken">Save</button>
            </div>
            <div class="auth-status" id="authStatus"></div>
          </div>
        </div>
        <div class="settings-group">
          <span class="settings-group-title">Preferences</span>
          <label class="toggle-row">
            <span>Intercept Downloads</span>
            <div class="toggle">
              <input type="checkbox" id="interceptToggle" checked />
              <span class="toggle-slider"></span>
            </div>
          </label>
        </div>
        <div class="settings-group">
          <span class="settings-group-title">Help & Support</span>
          <a class="help-link" href="https://github.com/surge-downloader/Surge#readme" target="_blank">
            <span>Documentation</span>
            <span class="help-link-arrow">&#8599;</span>
          </a>
          <a class="help-link" href="https://github.com/surge-downloader/Surge/issues" target="_blank">
            <span>Report an Issue</span>
            <span class="help-link-arrow">&#8599;</span>
          </a>
        </div>
      </section>
    </div>

    <!-- Duplicate Download Modal -->
    <div class="modal-overlay hidden" id="duplicateModal">
      <div class="modal-container">
        <div class="modal-icon">⚠️</div>
        <h2 class="modal-title">Duplicate Download</h2>
        <p class="modal-message">This file is already being downloaded:</p>
        <p class="modal-filename" id="duplicateFilename">filename.zip</p>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-secondary" id="duplicateSkip">
            Skip
          </button>
          <button class="modal-btn modal-btn-primary" id="duplicateConfirm">
            Download Anyway
          </button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
